<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Profile card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <div class="card-header">
          <img src="images/bg-pattern-card.svg" alt="" class="bg-pattern" />
        </div>

        <div class="avatar-container">
          <img
            src="images/image-victor.jpg"
            alt="Victor Crest"
            class="avatar"
          />
        </div>

        <div class="content">
          <div class="user-info">
            <h1 class="name">Victor Crest</h1>
            <span class="age">26</span>
          </div>
          <p class="from">London</p>
        </div>

        <hr class="divider" />

        <div class="stats-container">
          <div class="stat-block">
            <span class="stat-number">80K</span>
            <span class="stat-label">Followers</span>
          </div>
          <div class="stat-block">
            <span class="stat-number">803K</span>
            <span class="stat-label">Likes</span>
          </div>
          <div class="stat-block">
            <span class="stat-number">1.4K</span>
            <span class="stat-label">Photos</span>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
